# Free-tier deploy: Vercel (frontend) + Render (backend) via deploy hooks.
# Configure GitHub repository secrets before enabling (see deployment/*.md).

name: Deploy to Free Tier

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: wealthsense-frontend/package-lock.json

      - name: Install and build
        run: |
          cd wealthsense-frontend
          npm ci
          npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: wealthsense-frontend
          vercel-args: "--prod"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build services
        run: mvn package -DskipTests

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set; skipping Render trigger."
            echo "Add a deploy hook URL from each Render service (or one combined hook) in repository secrets."
            exit 0
          fi
          curl -fsS -X POST "${RENDER_DEPLOY_HOOK_URL}"

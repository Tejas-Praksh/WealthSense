name: Deploy to Staging

on:
  push:
    branches: [develop]

env:
  JAVA_VERSION: '21'

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build all services
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push images to Docker Hub
        run: |
          services=(
            "api-gateway"
            "user-service"
            "transaction-service"
            "fraud-detection-service"
            "decision-engine-service"
            "notification-service"
            "ai-advisor-service"
            "investment-service"
          )
          for service in "${services[@]}"; do
            echo "Building $service..."
            docker build \
              -t ${{ secrets.DOCKER_USERNAME }}/wealthsense-$service:staging \
              -t ${{ secrets.DOCKER_USERNAME }}/wealthsense-$service:${{ github.sha }} \
              ./$service
            docker push ${{ secrets.DOCKER_USERNAME }}/wealthsense-$service:staging
            docker push ${{ secrets.DOCKER_USERNAME }}/wealthsense-$service:${{ github.sha }}
          done

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/wealthsense
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f
            echo "✅ Staging deployed successfully — $(date)"

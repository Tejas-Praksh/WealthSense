name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to rollback to (e.g. abc1234)'
        required: true
        type: string
      services:
        description: 'Services to rollback (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

env:
  AWS_REGION: ap-south-1

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.commit_sha }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Rollback ECS services
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ROLLBACK_SHA: ${{ github.event.inputs.commit_sha }}
        run: |
          echo "🔄 Rolling back to commit: $ROLLBACK_SHA"

          all_services=(
            "api-gateway"
            "user-service"
            "transaction-service"
            "fraud-detection-service"
            "decision-engine-service"
            "notification-service"
            "ai-advisor-service"
            "investment-service"
          )

          INPUT="${{ github.event.inputs.services }}"
          if [ "$INPUT" == "all" ]; then
            services=("${all_services[@]}")
          else
            IFS=',' read -ra services <<< "$INPUT"
          fi

          for service in "${services[@]}"; do
            service=$(echo $service | tr -d ' ')
            echo "Rolling back wealthsense-$service to $ROLLBACK_SHA..."

            # Re-tag the old image as latest
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name wealthsense-$service \
              --image-ids imageTag=$ROLLBACK_SHA \
              --query 'images[0].imageManifest' \
              --output text 2>/dev/null)

            if [ -n "$MANIFEST" ] && [ "$MANIFEST" != "None" ]; then
              aws ecr put-image \
                --repository-name wealthsense-$service \
                --image-tag latest \
                --image-manifest "$MANIFEST"

              aws ecs update-service \
                --cluster wealthsense-cluster \
                --service wealthsense-$service \
                --force-new-deployment \
                --region ${{ env.AWS_REGION }}
              echo "✅ Rolled back wealthsense-$service"
            else
              echo "⚠️  Image not found for $service:$ROLLBACK_SHA — skipping"
            fi
          done

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster wealthsense-cluster \
            --services wealthsense-api-gateway \
            --region ${{ env.AWS_REGION }}
          echo "✅ Rollback complete and services stable"

      - name: Notify rollback
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ⚠️ WealthSense ROLLBACK ${{ job.status }}
            Rolled back to: ${{ github.event.inputs.commit_sha }}
            Initiated by: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

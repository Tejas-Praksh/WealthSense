# Production profile — decision-engine-service (MongoDB + Redis + Kafka, no PostgreSQL)
spring:
  data:
    redis:
      ssl:
        enabled: true

logging:
  level:
    com.wealthsense: INFO
    org.springframework: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

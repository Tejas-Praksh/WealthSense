server:
  port: 8082

spring:
  application:
    name: transaction-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/wealthsense_transactions}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

transaction:
  cache:
    page-ttl-minutes: ${CACHE_PAGE_TTL:5}
    summary-ttl-minutes: ${CACHE_SUMMARY_TTL:60}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL:5000}
    max-retries: ${OUTBOX_MAX_RETRIES:3}
    batch-size: ${OUTBOX_BATCH_SIZE:100}

encryption:
  key: ${ENCRYPTION_KEY}
webhook:
  secret: ${WEBHOOK_SECRET}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    kafka:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      fraudService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
      notificationService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      aiAdvisorService:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
  retry:
    instances:
      fraudService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      kafkaPublisher:
        maxAttempts: 3
        waitDuration: 1000ms
  bulkhead:
    instances:
      fraudService:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
      aiAdvisorService:
        maxConcurrentCalls: 10
        maxWaitDuration: 500ms
  timelimiter:
    instances:
      fraudService:
        timeoutDuration: 2s
      aiAdvisorService:
        timeoutDuration: 5s

wealthsense:
  health:
    fraud-service:
      enabled: true
      url: ${FRAUD_SERVICE_URL:http://localhost:8083}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  show-actuator: false
  packages-to-scan: com.wealthsense

logging:
  level:
    com.wealthsense: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId} spanId=%X{spanId} corr=%X{correlationId}] %-5level %logger{36} - %msg%n"

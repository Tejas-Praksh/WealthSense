spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

transaction:
  cache:
    page-ttl-minutes: 5
    summary-ttl-minutes: 60
  outbox:
    poll-interval-ms: 5000
    max-retries: 3
    batch-size: 100

logging:
  level:
    com.wealthsense: DEBUG

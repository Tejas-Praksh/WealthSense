server:
  port: 8085

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    kafka:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      fraudService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
      notificationService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      aiAdvisorService:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
  retry:
    instances:
      fraudService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      kafkaPublisher:
        maxAttempts: 3
        waitDuration: 1000ms
  bulkhead:
    instances:
      fraudService:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
      aiAdvisorService:
        maxConcurrentCalls: 10
        maxWaitDuration: 500ms
  timelimiter:
    instances:
      fraudService:
        timeoutDuration: 2s
      aiAdvisorService:
        timeoutDuration: 5s

wealthsense:
  health:
    fraud-service:
      enabled: true
      url: ${FRAUD_SERVICE_URL:http://localhost:8083}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  show-actuator: false
  packages-to-scan: com.wealthsense

logging:
  level:
    com.wealthsense: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId} spanId=%X{spanId} corr=%X{correlationId}] %-5level %logger{36} - %msg%n"

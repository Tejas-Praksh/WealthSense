# Production profile — API Gateway (no JPA)
spring:
  data:
    redis:
      ssl:
        enabled: true

logging:
  level:
    com.wealthsense: INFO
    org.springframework: WARN
    org.springframework.cloud.gateway: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

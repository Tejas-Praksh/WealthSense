spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

fraud:
  rules:
    large-amount-threshold-1: 500000
    large-amount-threshold-2: 5000000
    large-amount-threshold-3: 10000000
    velocity-window-minutes: 60
    velocity-threshold-medium: 5
    velocity-threshold-high: 10
    duplicate-window-minutes: 5
  redis:
    transaction-history-ttl-hours: 2
    merchant-history-ttl-days: 30
    max-recent-transactions: 20

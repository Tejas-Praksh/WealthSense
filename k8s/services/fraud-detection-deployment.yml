apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: wealthsense
  labels:
    app: fraud-detection
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fraud-detection
        version: v1
    spec:
      containers:
        - name: fraud-detection
          image: wealthsense/fraud-detection-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: production
            - name: POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/wealthsense_fraud
          envFrom:
            - configMapRef:
                name: wealthsense-config
            - secretRef:
                name: wealthsense-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/startup
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection
  namespace: wealthsense
spec:
  selector:
    app: fraud-detection
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP

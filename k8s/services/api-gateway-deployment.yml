apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wealthsense
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
        - name: api-gateway
          image: wealthsense/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: production
            - name: USER_SERVICE_URL
              value: http://user-service:8081
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service:8082
            - name: FRAUD_SERVICE_URL
              value: http://fraud-detection:8083
            - name: DECISION_ENGINE_SERVICE_URL
              value: http://decision-engine:8084
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8085
            - name: AI_ADVISOR_SERVICE_URL
              value: http://ai-advisor:8086
            - name: INVESTMENT_SERVICE_URL
              value: http://investment-service:8087
          envFrom:
            - configMapRef:
                name: wealthsense-config
            - secretRef:
                name: wealthsense-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/startup
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: wealthsense
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

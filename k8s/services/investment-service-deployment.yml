apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-service
  namespace: wealthsense
  labels:
    app: investment-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: investment-service
        version: v1
    spec:
      containers:
        - name: investment-service
          image: wealthsense/investment-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: production
            - name: POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/wealthsense
          envFrom:
            - configMapRef:
                name: wealthsense-config
            - secretRef:
                name: wealthsense-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/startup
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: investment-service
  namespace: wealthsense
spec:
  selector:
    app: investment-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP

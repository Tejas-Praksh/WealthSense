global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: wealthsense
    environment: development

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8081"]

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["transaction-service:8082"]

  - job_name: fraud-detection-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["fraud-detection-service:8083"]

  - job_name: decision-engine-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["decision-engine-service:8084"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8085"]

  - job_name: ai-advisor-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ai-advisor-service:8086"]

  - job_name: investment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["investment-service:8087"]

input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [type] == "spring-boot" {
    json {
      source => "message"
    }
    date {
      match => ["timestamp", "ISO8601"]
    }
    mutate {
      add_field => {
        "environment" => "development"
        "application" => "wealthsense"
      }
    }
  }

  if [level] == "ERROR" {
    mutate {
      add_tag => ["error", "alert"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "wealthsense-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}

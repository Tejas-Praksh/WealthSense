server:
  port: 8086
spring:
  application:
    name: ai-advisor-service
  ai:
    anthropic:
      api-key: ${CLAUDE_API_KEY:test-key}
      chat:
        options:
          model: claude-3-5-sonnet-20241022
          max-tokens: 1000
          temperature: 0.7
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/wealthsense}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

logging:
  level:
    com.wealthsense: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId} spanId=%X{spanId} corr=%X{correlationId}] %-5level %logger{36} - %msg%n"

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    kafka:
      enabled: true
    redis:
      enabled: true
    db:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      fraudService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
      notificationService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      aiAdvisorService:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
  retry:
    instances:
      fraudService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      kafkaPublisher:
        maxAttempts: 3
        waitDuration: 1000ms
  bulkhead:
    instances:
      fraudService:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
      aiAdvisorService:
        maxConcurrentCalls: 10
        maxWaitDuration: 500ms
  timelimiter:
    instances:
      fraudService:
        timeoutDuration: 2s
      aiAdvisorService:
        timeoutDuration: 5s

wealthsense:
  health:
    ai-service:
      enabled: true
      url: ${AI_ADVISOR_URL:http://localhost:8086}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  show-actuator: false
  packages-to-scan: com.wealthsense
